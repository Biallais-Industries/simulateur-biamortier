<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simulateur Biamortier V1 - Lancement</title>
    
    <link rel="icon" type="image/png" href="logo-512.png">
    <link rel="apple-touch-icon" href="logo-512.png">
    <meta name="theme-color" content="#0d47a1">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f6; margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; display: flex; flex-direction: row; }
        .controls { width: 380px; min-width: 380px; background: white; height: 100%; overflow-y: auto; padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.1); z-index: 10; display: flex; flex-direction: column; gap: 15px; }
        .preview-container { flex: 1; background: #dce1e8; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; position: relative; height: 100%; }
        .canvas-wrapper { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; max-height: 90vh; }
        canvas { display: block; max-width: 100%; max-height: 100%; width: auto; height: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.3); background: white; cursor: default; image-rendering: auto; }
        h2 { margin: 0 0 5px 0; color: #1a1a1a; font-size: 1.2rem; }
        h3 { margin: 10px 0 5px 0; color: #0d47a1; font-size: 1rem; }
        label { display: block; font-size: 0.85rem; color: #343a40; margin-bottom: 4px; font-weight: 600; }
        .input-row { display: flex; gap: 10px; }
        .input-group { flex: 1; }
        input[type="text"], input[type="number"], select { width: 100%; padding: 8px; border: 1px solid #ced4da; border-radius: 6px; font-size: 0.9rem; }
        input[type="range"] { width: 100%; margin: 8px 0; }
        .upload-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .brick-slot { width: 100%; aspect-ratio: 16/9; border: 2px dashed #cbd5e1; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; position: relative; background: #f8f9fa; transition: 0.2s; font-size: 0.75rem; color: #adb5bd; text-align:center; flex-direction: column; }
        .brick-slot img { width: 100%; height: 100%; object-fit: cover; }
        .brick-slot.active { border-style: solid; border-color: #28a745; }
        .remove-btn { position: absolute; top: 2px; right: 2px; background: rgba(255,0,0,0.7); color: white; border-radius: 50%; width: 16px; height: 16px; font-size: 10px; display: flex; align-items: center; justify-content: center; z-index: 10; cursor: pointer; }
        
        .calibration-box { background: #fff3cd; border: 1px solid #ffeeba; padding: 10px; border-radius: 8px; margin-top: 15px; position: relative; }
        .calibration-slider { display: flex; align-items: center; gap: 10px; font-size: 0.8rem; margin-bottom: 5px; }
        .calibration-slider label { width: 70px; margin:0; font-weight: bold; }
        .calibration-slider input[type="range"] { flex:1; }
        
        .dev-box { background: #e2e3e5; border: 1px solid #d6d8db; padding: 10px; border-radius: 8px; margin-top: 10px; }
        .val-badge { background: #fff; padding: 2px 5px; border-radius: 4px; font-size: 0.7rem; border: 1px solid #ccc; width:45px; text-align:center; display:inline-block; }

        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.9rem; transition: 0.2s; }
        .btn-jpg { background: #198754; color: white; }
        .btn-pdf { background: #dc3545; color: white; }
        
        #joint-preview-dot { width: 40px; height: 38px; border-radius: 6px; border: 1px solid #dee2e6; background-color: #f4f4f4; flex-shrink: 0; }
        .btn-fav { background: #fff; border: 1px solid #ced4da; border-radius: 6px; width: 38px; height: 38px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .fav-bar { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; min-height: 30px; padding: 5px; background: #f0f4f8; border-radius: 6px; }
        .fav-pill { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px; border: 1px solid rgba(0,0,0,0.1); }
        .submit-btn { background: #0d47a1; color: white; width: 100%; margin-top: 15px; padding: 12px; border-radius: 6px; border:none; cursor: pointer; font-weight: bold; }
        .reset-btn { background: #6c757d; color: white; width: 100%; margin-top: 8px; padding: 8px; border-radius: 6px; border:none; cursor: pointer; font-weight: bold; font-size: 0.8rem; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.85); z-index: 2000; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        .modal-content { background: white; padding: 20px; border-radius: 8px; text-align: center; max-width: 95vw; max-height: 95vh; display:flex; flex-direction:column; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        #crop-canvas { max-width: 100%; max-height: 60vh; cursor: crosshair; touch-action: none; background: #222; display: block; }

        @media (max-width: 850px) {
            body { flex-direction: column; overflow: auto; height: auto; }
            .preview-container { order: 1; position: sticky; top: 0; z-index: 100; height: 40vh; padding: 10px; border-bottom: 2px solid #ccc; }
            .controls { order: 2; width: 100%; height: auto; padding-bottom: 50px; }
        }
    </style>
</head>
<body>

<div id="crop-modal" class="modal-overlay" style="display:none;">
    <div class="modal-content">
        <h2>✂️ Recadrer la brique</h2>
        <button onclick="rotateImageInCrop()" style="background:#ff9800; color:white; margin-bottom:10px; padding:8px; border-radius:4px; border:none; font-weight:bold; cursor:pointer;">🔄 Pivoter 90°</button>
        <canvas id="crop-canvas"></canvas>
        <div class="btn-group" style="margin-top:20px;">
            <button onclick="closeCropModal()" style="background:#6c757d; color:white;">Annuler</button>
            <button onclick="validateCrop()" style="background:#198754; color:white;">Valider</button>
        </div>
    </div>
</div>

<div id="export-modal" class="modal-overlay" style="display:none;">
    <div class="modal-content" style="width: 600px; max-width: 90vw;">
        <h2>📥 Code de Mise à Jour</h2>
        <textarea id="export-text" style="width: 100%; height: 300px; font-family: monospace; font-size: 0.75rem; padding: 10px; border: 1px solid #ccc;" readonly></textarea>
        <div class="btn-group" style="margin-top:20px;">
            <button onclick="document.getElementById('export-modal').style.display='none'" style="background:#6c757d; color:white;">Fermer</button>
            <button onclick="copyExportText()" style="background:#0d6efd; color:white;">📋 Copier</button>
        </div>
    </div>
</div>

<div class="controls">
    <div style="display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid #eee; padding-bottom:10px;">
        <h2>🛠️ Configurateur</h2>
        <span style="font-size:0.7rem; color:#888;">V1.5.1</span>
    </div>

    <div style="background: #e3f2fd; border: 1px solid #90caf9; padding: 15px; border-radius: 8px;">
        <label>Mes Projets (Sauvegarde Locale)</label>
        <select id="userLibrarySelect" onchange="loadUserPreset()"><option value="">-- Projets sauvegardés --</option></select>
        <div style="display:flex; gap:5px; margin-top:8px;">
            <button onclick="saveToUserLibrary()" style="background:#0d6efd; color:white; font-size:0.8rem; padding:8px;">+ Sauvegarder</button>
            <button onclick="deleteFromUserLibrary()" style="background:#dc3545; color:white; font-size:0.8rem; padding:8px;">Suppr.</button>
        </div>
    </div>
    
    <div>
        <h3>1. Configuration Brique</h3>
        <input type="text" id="input-brick-name" placeholder="Nom de la brique (Fabricant + Type)" oninput="scheduleRender()" style="margin-bottom:10px;">
        <div class="input-row">
            <div class="input-group"><label>L (mm)</label><input type="number" id="input-longueur" value="220" onchange="forceWallRegen()"></div>
            <div class="input-group"><label>H (mm)</label><input type="number" id="input-hauteur" value="60" onchange="forceWallRegen()"></div>
        </div>
        <div class="upload-grid">
            <div class="brick-slot" id="slot-0" onclick="triggerUpload(0)">+ Photo 1</div>
            <div class="brick-slot" id="slot-1" onclick="triggerUpload(1)">+ Photo 2</div>
            <div class="brick-slot" id="slot-2" onclick="triggerUpload(2)">+ Photo 3</div>
        </div>
        <input type="file" id="hidden-file-input" accept="image/*" style="display: none;">

        <div class="calibration-box">
            <div class="calibration-slider"><label>Lumière</label><input type="range" id="calib-brightness" min="50" max="150" value="100" oninput="scheduleRender()"></div>
            <div class="calibration-slider"><label>Saturation</label><input type="range" id="calib-saturation" min="0" max="300" value="100" oninput="scheduleRender()"></div>
        </div>
    </div>

    <div>
        <h3>2. Joint & Mortier</h3>
        <div class="input-group">
            <div class="input-row" style="align-items: center;">
                <select id="categorySelect" onchange="filterColors()" style="flex:1;">
                    <option value="all">Tout</option>
                    <option value="Standards">Standards</option>
                    <option value="Noirs & Gris">Noirs & Gris</option>
                    <option value="Jaunes">Jaunes</option>
                    <option value="Marron">Marron</option>
                    <option value="Rouges">Rouges</option>
                    <option value="Saumon">Saumons</option>
                    <option value="Lie de vin">Lie de Vin</option>
                </select>
                <div id="joint-preview-dot" style="margin: 0 5px;"></div>
                <button class="btn-fav" onclick="toggleFavorite()" title="Favoris">⭐</button>
            </div>
            <select id="jointColorSelect" onchange="onJointSelected()" style="margin-top:5px;"></select>
        </div>

        <div id="fav-bar" class="fav-bar">
            <span style="font-size: 0.7rem; color: #888; width: 100%;">Comparateur rapide :</span>
        </div>

        <div class="dev-box" id="dev-box" style="display: none;">
            <h4 style="margin:0 0 10px 0;">⚙️ Admin : Gestion</h4>
            <div style="background:#fff; padding:8px; border-radius:4px; margin-bottom:10px; border:1px solid #ccc;">
                <input type="text" id="dev-new-name" placeholder="NOM NOUVELLE COULEUR" style="width:70%; font-size:0.8rem; padding:4px;">
                <button onclick="addNewColor()" style="background:#198754; color:white; padding:4px; font-size:0.8rem;">➕</button>
            </div>
            <div class="calibration-slider"><label>L</label><input type="range" id="dev-l" min="10" max="95" step="0.5" oninput="updateAdminColor()"><span class="val-badge" id="val-l">50</span></div>
            <div class="calibration-slider"><label>C</label><input type="range" id="dev-c" min="0" max="60" step="0.5" oninput="updateAdminColor()"><span class="val-badge" id="val-c">20</span></div>
            <div class="calibration-slider"><label>H</label><input type="range" id="dev-h" min="0" max="360" step="1" oninput="updateAdminColor()"><span class="val-badge" id="val-h">0</span></div>
            <div class="btn-group">
                <button onclick="deleteCurrentColor()" style="background:#bb2d3b; color:white; font-size:0.7rem;">🗑️ Supprimer</button>
                <button onclick="generateEncodedExport()" style="background:#0d6efd; color:white; font-size:0.7rem;">🔒 Export Encodé</button>
            </div>
        </div>

        <div class="input-row" style="margin-top:10px;">
            <div class="input-group"><label>Epaisseur Joint (mm)</label><input type="range" id="slider-epaisseur" min="8" max="25" value="12" oninput="scheduleRender()"></div>
        </div>
        
        <div style="background: #e9ecef; padding: 10px; border-radius: 8px; margin-top: 15px;">
            <span onclick="toggleDevBox()" style="font-size:0.6rem; color:#aaa; cursor:pointer;">Admin</span>
            <input type="text" id="input-user-name" placeholder="Votre Nom / Prénom" style="margin-top:5px; margin-bottom:10px;">
            <button class="submit-btn" onclick="submitToAdmin()">📤 Demander échantillon</button>
            <button class="reset-btn" onclick="resetSimulator()">🔄 Réinitialiser tout</button>
        </div>
    </div>

    <div style="margin-top: 15px;">
        <label>Distance de vue (Zoom)</label>
        <input type="range" id="slider-zoom" min="0.5" max="5.0" step="0.1" value="1.5" oninput="scheduleRender()">
        <div class="btn-group"><button class="btn-jpg" onclick="downloadImage()">IMAGE JPG</button><button class="btn-pdf" onclick="downloadPDF()">FICHIER PDF</button></div>
    </div>
</div>

<div class="preview-container">
    <div class="canvas-wrapper"><canvas id="canvas"></canvas></div>
</div>

    // --- FAVORIS ---
    function toggleFavorite() {
        if (!currentJointColor) return;
        if (favorites.find(f => f.name === currentJointColor.name)) {
            favorites = favorites.filter(f => f.name !== currentJointColor.name);
        } else {
            if (favorites.length < 6) favorites.push(currentJointColor);
        }
        renderFavorites();
    }

    function renderFavorites() {
        const bar = document.getElementById('fav-bar');
        bar.innerHTML = '<span style="font-size: 0.7rem; color: #888; width: 100%;">Comparateur rapide :</span>';
        favorites.forEach((fav, i) => {
            const pill = document.createElement('div'); pill.className = 'fav-pill';
            pill.style.backgroundColor = `rgb(${fav.r},${fav.g},${fav.b})`;
            pill.style.color = (0.3*fav.r + 0.6*fav.g + 0.1*fav.b) > 130 ? '#000' : '#fff';
            pill.innerHTML = `<span>${fav.name}</span><span style="margin-left:5px" onclick="event.stopPropagation(); favorites.splice(${i},1); renderFavorites();">✕</span>`;
            pill.onclick = () => {
                document.getElementById('categorySelect').value = fav.cat; filterColors();
                const sel = document.getElementById('jointColorSelect');
                for(let opt of sel.options) { 
                    if(opt.value && JSON.parse(opt.value).name === fav.name){ sel.value = opt.value; onJointSelected(); break; }
                }
            };
            bar.appendChild(pill);
        });
    }

    function openCropModal(img) {
        cropImg = img; const m = document.getElementById('crop-modal'), c = document.getElementById('crop-canvas');
        const mw = window.innerWidth*0.9, mh = window.innerHeight*0.55; 
        cropScale = Math.min(mw/img.width, mh/img.height, 1);
        c.width = img.width*cropScale; c.height = img.height*cropScale;
        const r = (parseFloat(document.getElementById('input-longueur').value)||220)/(parseFloat(document.getElementById('input-hauteur').value)||60);
        let iw = c.width*0.8, ih = iw/r; if(ih > c.height*0.8) { ih = c.height*0.8; iw = ih*r; }
        cropRect = { x: (c.width-iw)/2, y: (c.height-ih)/2, w: iw, h: ih }; 
        m.style.display = 'flex'; drawCropView();
    }

    function closeCropModal() { document.getElementById('crop-modal').style.display = 'none'; cropImg = null; }
    
    function drawCropView() {
        const c = document.getElementById('crop-canvas'), x = c.getContext('2d');
        x.drawImage(cropImg, 0, 0, c.width, c.height);
        x.fillStyle = 'rgba(0,0,0,0.6)'; x.fillRect(0,0,c.width,c.height);
        x.clearRect(cropRect.x, cropRect.y, cropRect.w, cropRect.h);
        x.drawImage(cropImg, cropRect.x/cropScale, cropRect.y/cropScale, cropRect.w/cropScale, cropRect.h/cropScale, cropRect.x, cropRect.y, cropRect.w, cropRect.h);
        x.strokeStyle='#0d6efd'; x.lineWidth=2; x.strokeRect(cropRect.x, cropRect.y, cropRect.w, cropRect.h);
    }

    const cropCanvasElement = document.getElementById('crop-canvas');
    cropCanvasElement.addEventListener('mousedown', (e) => { 
        isDraggingCrop = true; const r = cropCanvasElement.getBoundingClientRect(); 
        cropStartX = e.clientX-r.left; cropStartY = e.clientY-r.top; 
    });
    cropCanvasElement.addEventListener('mousemove', (e) => {
        if(!isDraggingCrop) return; const r = cropCanvasElement.getBoundingClientRect(); 
        const cx = e.clientX-r.left, cy = e.clientY-r.top;
        const rat = (parseFloat(document.getElementById('input-longueur').value)||220)/(parseFloat(document.getElementById('input-hauteur').value)||60);
        let w = Math.abs(cx-cropStartX), h = w/rat;
        cropRect = { x: cx<cropStartX?cropStartX-w:cropStartX, y: cy<cropStartY?cropStartY-h:cropStartY, w, h };
        drawCropView();
    });
    window.addEventListener('mouseup', () => isDraggingCrop = false);

    function rotateImageInCrop() {
        const tC = document.createElement('canvas'); tC.width = cropImg.height; tC.height = cropImg.width;
        const tx = tC.getContext('2d'); tx.translate(tC.width/2, tC.height/2); tx.rotate(Math.PI/2); tx.drawImage(cropImg, -cropImg.width/2, -cropImg.height/2);
        const rI = new Image(); rI.onload = () => { cropImg = rI; openCropModal(rI); }; rI.src = tC.toDataURL('image/jpeg', 0.95);
    }

    function validateCrop() {
        const c = document.createElement('canvas'); const os = Math.min(1500/(cropRect.w/cropScale), 1);
        c.width = (cropRect.w/cropScale)*os; c.height = (cropRect.h/cropScale)*os; const x = c.getContext('2d');
        x.drawImage(cropImg, cropRect.x/cropScale, cropRect.y/cropScale, cropRect.w/cropScale, cropRect.h/cropScale, 0, 0, c.width, c.height);

        });

        // Fond Mortier
        ctx.fillStyle = currentJointColor ? `rgb(${currentJointColor.r},${currentJointColor.g},${currentJointColor.b})` : "#eee";
        ctx.fillRect(0,0,1200,800);

        // Texture Grain
        ctx.globalCompositeOperation = 'overlay'; ctx.fillStyle = grainTexture; ctx.fillRect(0,0,1200,800);
        ctx.globalCompositeOperation = 'source-over';

        // Pose des briques
        let y=0, rIdx=0;
        while(y < 800) {
            let x = (rIdx%2 !== 0) ? -(L/2)-(J/2) : 0;
            let cIdx = 0;
            while(x < 1200) {
                const bIdx = wallLayoutCache[rIdx%100][cIdx%50] % pre.length;
                ctx.drawImage(pre[bIdx], x, y);
                x += L + J; cIdx++;
            }
            y += Hb + J; rIdx++;
        }

        // Barre d'info basse
        ctx.fillStyle = "white"; ctx.fillRect(0, 800, 1200, 110);
        ctx.fillStyle = "#222"; ctx.font = "bold 22px 'Segoe UI'"; ctx.textAlign = "left";
        ctx.fillText(`JOINT : ${currentJointColor ? currentJointColor.name : "Non défini"}`, 30, 845);
        ctx.textAlign = "right";
        ctx.fillText(`BRIQUE : ${document.getElementById('input-brick-name').value || "Standard"}`, 1170, 845);
        ctx.fillStyle = "#dc3545"; ctx.font = "italic 16px 'Segoe UI'"; ctx.textAlign = "center";
        ctx.fillText("Document indicatif. Nuance à valider impérativement par un essai sur chantier.", 600, 885);
    }

    // --- UTILITAIRES ---
    function filterColors() {
        const cat = document.getElementById('categorySelect').value, sel = document.getElementById('jointColorSelect');
        sel.innerHTML = '<option value="">-- Choisir une teinte --</option>';
        let list = (cat === 'all' ? [...NUANCIER_COMPLET] : NUANCIER_COMPLET.filter(c => c.cat === cat));
        list.sort((a,b) => b.l - a.l);
        list.forEach(c => {
            const o = document.createElement('option'); o.value = JSON.stringify(c); o.textContent = c.name;
            o.style.backgroundColor = `rgb(${c.r},${c.g},${c.b})`; o.style.color = (0.3*c.r+0.6*c.g+0.1*c.b)>130?'#000':'#fff';
            sel.appendChild(o);
        });
        updatePreviewDot(); scheduleRender();
    }

    function onJointSelected() {
        const v = document.getElementById('jointColorSelect').value; 
        if(v) { 
            currentJointColor = JSON.parse(v); 
            document.getElementById('dev-l').value = currentJointColor.l;
            document.getElementById('dev-c').value = currentJointColor.c;
            document.getElementById('dev-h').value = currentJointColor.h;
        }
        document.getElementById('val-l').innerText = document.getElementById('dev-l').value || 50;
        document.getElementById('val-c').innerText = document.getElementById('dev-c').value || 20;
        document.getElementById('val-h').innerText = document.getElementById('dev-h').value || 0;
        updatePreviewDot(); scheduleRender();
    }

    function updateAdminColor() {
        if(!currentJointColor) return;
        const l = parseFloat(document.getElementById('dev-l').value), c = parseFloat(document.getElementById('dev-c').value), h = parseFloat(document.getElementById('dev-h').value);
        const idx = NUANCIER_COMPLET.findIndex(x => x.name === currentJointColor.name);
        const tC = document.createElement('canvas'); tC.width=1; tC.height=1; const tx = tC.getContext('2d', {colorSpace:'srgb'});
        tx.fillStyle = `lch(${l}% ${c} ${h})`; tx.fillRect(0,0,1,1); const p = tx.getImageData(0,0,1,1).data;
        NUANCIER_COMPLET[idx] = {...NUANCIER_COMPLET[idx], l, c, h, r:p[0], g:p[1], b:p[2]};
        currentJointColor = NUANCIER_COMPLET[idx]; onJointSelected();
    }

    function updatePreviewDot() { document.getElementById('joint-preview-dot').style.backgroundColor = currentJointColor ? `rgb(${currentJointColor.r},${currentJointColor.g},${currentJointColor.b})` : '#f4f4f4'; }
    function forceWallRegen() { wallLayoutCache = []; for(let r=0; r<100; r++) { let row = []; for(let c=0; c<50; c++) row.push(Math.floor(Math.random()*3)); wallLayoutCache.push(row); } scheduleRender(); }

    function updateSlotVisual(idx, src, isPlace) {
        const d = document.getElementById(`slot-${idx}`); d.innerHTML = src ? `<img src="${src}">` : "";
        if(!isPlace) {
            d.classList.add('active'); const b = document.createElement('div'); b.className='remove-btn'; b.innerHTML='x';
            b.onclick=(e)=>{e.stopPropagation(); loadedBricks[idx]=null; updateSlotVisual(idx,"",true); forceWallRegen();}; d.appendChild(b);
        } else {
            d.classList.remove('active'); d.innerHTML += `<div style="position:absolute; color:#007bff; font-weight:bold;">+ Photo ${idx+1}</div>`;
        }
    }

    function generateProceduralGrain() {
        const s = 512, c = document.createElement('canvas'); c.width = s; c.height = s; const x = c.getContext('2d');
        x.fillStyle = "rgb(128,128,128)"; x.fillRect(0,0,s,s); const d = x.getImageData(0,0,s,s); const m = d.data;
        for(let i=0; i<m.length; i+=4){ const n = (Math.random()-0.5)*100; m[i]=128+n; m[i+1]=128+n; m[i+2]=128+n; m[i+3]=255; }
        x.putImageData(d,0,0); return x.createPattern(c, 'repeat');
    }

    function generateDefaultBrick() {
        const c = document.createElement('canvas'); c.width=440; c.height=120; const x=c.getContext('2d');
        x.fillStyle="#c25e44"; x.fillRect(0,0,440,120); const d=x.getImageData(0,0,440,120); const m=d.data;
        for(let i=0; i<m.length; i+=4){ const n=(Math.random()-0.5)*40; m[i]=Math.min(255,Math.max(0,m[i]+n)); m[i+1]=Math.min(255,Math.max(0,m[i+1]+n)); m[i+2]=Math.min(255,Math.max(0,m[i+2]+n)); }
        x.putImageData(d,0,0); x.fillStyle="rgba(255,255,255,0.4)"; x.font="bold 24px 'Segoe UI'"; x.textAlign="center"; x.fillText("Brique d'exemple", 220, 70);
        return c.toDataURL();
    }

    window.onload = () => {
        filterColors();
        const sel = document.getElementById('jointColorSelect');
        for(let i=0; i<sel.options.length; i++) { if(sel.options[i].text === "GRIS CLAIR") { sel.selectedIndex = i; onJointSelected(); break; } }
        grainTexture = generateProceduralGrain();
        initDefaultState();
        refreshLibraryUI();
    };

    // --- SAUVEGARDE ET EXPORTS ---
    async function getUserLibrary() { const s = await localforage.getItem(STORAGE_KEY); return s ? s : []; }
    async function refreshLibraryUI() {
        const lib = await getUserLibrary(); const sel = document.getElementById('userLibrarySelect');
        sel.innerHTML = '<option value="">-- Projets sauvegardés --</option>';
        lib.forEach((item, index) => { const opt = document.createElement('option'); opt.value = index; opt.innerText = item.name; sel.appendChild(opt); });
    }
    async function saveToUserLibrary() {
        const n = document.getElementById('input-brick-name').value; if(!n) { alert("Nommez le projet !"); return; }
        const config = { name: n, dims: { l: document.getElementById('input-longueur').value, h: document.getElementById('input-hauteur').value, ep: document.getElementById('slider-epaisseur').value }, calib: { b: document.getElementById('calib-brightness').value, s: document.getElementById('calib-saturation').value }, joint: currentJointColor, images: loadedBricks.map(img => img && !img.isPlaceholder ? img.src : null) };
        const lib = await getUserLibrary(); lib.push(config); await localforage.setItem(STORAGE_KEY, lib); alert("✅ Projet sauvegardé !"); refreshLibraryUI();
    }
    async function loadUserPreset() {
        const idx = document.getElementById('userLibrarySelect').value; if(idx === "") return;
        const lib = await getUserLibrary(); const p = lib[idx]; if(!p) return;
        document.getElementById('input-brick-name').value = p.name; document.getElementById('input-longueur').value = p.dims.l; document.getElementById('input-hauteur').value = p.dims.h; document.getElementById('slider-epaisseur').value = p.dims.ep;
        document.getElementById('calib-brightness').value = p.calib.b; document.getElementById('calib-saturation').value = p.calib.s;
        if(p.joint) { currentJointColor = p.joint; filterColors(); const sel = document.getElementById('jointColorSelect'); for(let opt of sel.options){ if(opt.value && JSON.parse(opt.value).name === p.joint.name) { sel.value = opt.value; onJointSelected(); } } }
        p.images.forEach((src, i) => { if(src) { const img = new Image(); img.onload = () => { loadedBricks[i] = img; updateSlotVisual(i, src, false); forceWallRegen(); }; img.src = src; } else { loadedBricks[i] = null; updateSlotVisual(i, "", true); } });
    }
    function downloadImage() { const a = document.createElement('a'); a.download = 'Simulateur_Biamortier.jpg'; a.href = canvas.toDataURL('image/jpeg', 0.92); a.click(); }
    function downloadPDF() { const { jsPDF } = window.jspdf; const doc = new jsPDF('l','mm','a4'); doc.addImage(canvas.toDataURL('image/jpeg',0.9),'JPEG',10,10,277,190); doc.save('Simulateur_Biamortier.pdf'); }
    function copyExportText() { navigator.clipboard.writeText(document.getElementById("export-text").value); alert("✅ Code copié !"); }
    function submitToAdmin() { alert("Demande envoyée (simulation). Pensez à joindre votre fichier PDF généré."); }
</script>
